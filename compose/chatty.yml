# Prod compose for pr.openape.ai on chatty — tested image from
# registry.openape.ai, packaged by compose/package.Dockerfile and deployed by
# scripts/deploy-image.mjs (which syncs this file to
# /home/openape/prod-pr/docker-compose.yml).
#
# Same design as the other openape apps:
# - Mounts shared/ at an IDENTICAL path inside the container and reuses
#   shared/.env via env_file — the absolute file:-SQLite URL keeps working.
# - HOST is overridden to 0.0.0.0 (the .env may pin 127.0.0.1, which would
#   bind loopback INSIDE the container); `environment` wins over `env_file`.
# - Port publishes on 127.0.0.1:3009 (local) + 10.0.1.1:3009 (Traefik via the
#   bridge gateway — the edge terminates TLS).
# - user: 999:988 (openape) so DB/WAL files stay openape-owned.
# - Image tag pinned via /home/openape/prod-pr/.env (PR_TAG; PR_TAG_PREV is
#   the rollback pin).

name: openape-pr

services:
  pr:
    image: registry.openape.ai/openape-pr:${PR_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-pr/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-pr/shared:/home/openape/projects/openape-pr/shared
    ports:
      - "127.0.0.1:3009:3009"
      - "10.0.1.1:3009:3009"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3009/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
