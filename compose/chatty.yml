# Prod compose for testrun.openape.ai on chatty — tested image from
# registry.openape.ai, packaged by compose/package.Dockerfile and deployed by
# scripts/deploy-image.mjs (which syncs this file to
# /home/openape/prod-testrun/docker-compose.yml).
#
# Same design as the monorepo's compose/chatty.yml:
# - Mounts the existing systemd-era shared/ at the IDENTICAL path and reuses
#   shared/.env via env_file — the absolute file:-SQLite URL keeps working.
# - HOST is overridden to 0.0.0.0 (the .env pins 127.0.0.1, which would bind
#   loopback INSIDE the container); `environment` wins over `env_file`.
# - Port publishes on 127.0.0.1:3006 — exactly where nginx already proxies,
#   so the nginx config is untouched by the systemd→container cutover.
# - user: 999:988 (openape) so the DB/WAL files stay openape-owned and the
#   dormant systemd fallback could still take over.
# - Image tag pinned via /home/openape/prod-testrun/.env (TESTRUN_TAG,
#   TESTRUN_TAG_PREV is the rollback pin).

name: openape-testrun

services:
  testrun:
    image: registry.openape.ai/openape-testrun:${TESTRUN_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-testrun/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-testrun/shared:/home/openape/projects/openape-testrun/shared
    ports:
      - "127.0.0.1:3006:3006"
      # Traefik (coolify network) reaches the container via the bridge
      # gateway — nginx is retired, the edge terminates TLS itself.
      - "10.0.1.1:3006:3006"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3006/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
